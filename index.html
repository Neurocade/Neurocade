<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>NEUROCADE</title>
<style>
  body {
    font-family: 'Orbitron', sans-serif;
    background: radial-gradient(circle at center, #0a0a0a, #000);
    color: #fff;
    text-align: center;
    margin: 0;
  }
  h1 {
    font-size: 4rem;
    color: cyan;
    text-shadow: 0 0 10px magenta, 0 0 20px magenta, 0 0 30px cyan;
    margin-top: 40px;
  }
  button {
    padding: 15px 30px;
    font-size: 1.5rem;
    background: magenta;
    color: white;
    border: none;
    border-radius: 10px;
    cursor: pointer;
    box-shadow: 0 0 10px cyan, 0 0 20px magenta;
    transition: transform 0.2s;
  }
  button:hover {
    transform: scale(1.05);
  }
  #gameScreen {
    display: none;
    margin-top: 20px;
  }
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(80px, 1fr));
    grid-gap: 10px;
    justify-content: center;
    margin: 20px auto;
    max-width: 450px;
  }
  .card {
    perspective: 800px;
    cursor: pointer;
  }
  .card-inner {
    position: relative;
    width: 100%;
    aspect-ratio: 1 / 1;
    transform-style: preserve-3d;
    transition: transform 0.6s;
  }
  .card.flipped .card-inner {
    transform: rotateY(180deg);
  }
  .card-front, .card-back {
    position: absolute;
    width: 100%;
    height: 100%;
    border: 2px solid cyan;
    border-radius: 6px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 2rem;
    backface-visibility: hidden;
  }
  .card-front {
    background: #111;
    color: transparent;
  }
  .card-back {
    background: #222;
    color: white;
    transform: rotateY(180deg);
  }
  .card.shake .card-inner {
    animation: shake 0.4s;
  }
  @keyframes shake {
    0%, 100% { transform: rotateY(0deg) translateX(0); }
    25% { transform: rotateY(0deg) translateX(-5px); }
    50% { transform: rotateY(0deg) translateX(5px); }
    75% { transform: rotateY(0deg) translateX(-5px); }
  }
  #feedback {
    font-size: 1.2rem;
    margin-top: 10px;
    height: 1.5rem;
  }
  #winner {
    display: none;
    font-size: 2rem;
    margin-top: 20px;
    color: yellow;
    text-shadow: 0 0 10px orange, 0 0 20px red;
    animation: pulse 1.5s infinite;
  }
  @keyframes pulse {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.1); }
  }
  #chicken {
    display: none;
    width: 200px;
    margin-top: 20px;
    animation: dance 1s infinite;
  }
  @keyframes dance {
    0%, 100% { transform: rotate(0deg); }
    25% { transform: rotate(10deg); }
    75% { transform: rotate(-10deg); }
  }
</style>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;900&display=swap&display=swap" rel="stylesheet">
</head>
<body>
<div id="homeScreen">
  <h1>NEUROCADE</h1>
  <button onclick="startGame()">Start Memory Match</button>
</div>

<div id="gameScreen">
  <div class="grid" id="grid"></div>
  <div id="feedback"></div>
  <div id="winner">Winner Winner Chicken Dinner!</div>
  <img id="chicken" src="https://i.imgur.com/7lqzQp3.png" alt="Dancing Chicken">
  <br>
  <button onclick="goHome()">Back to Home</button>
</div>

<audio id="ding" src="https://actions.google.com/sounds/v1/cartoon/clang_and_wobble.ogg"></audio>
<audio id="buzzer" src="https://actions.google.com/sounds/v1/cartoon/wood_plank_flicks.ogg"></audio>

<script>
const items = ['🍎','🚗','🥕','⚽','👕','🍌','🚲','🥦'];
let gridData = [];
let firstCard = null;
let lockBoard = false;
let matchesFound = 0;

function shuffle(array) {
  for (let i = array.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [array[i], array[j]] = [array[j], array[i]];
  }
  return array;
}

function startGame() {
  document.getElementById('homeScreen').style.display = 'none';
  document.getElementById('gameScreen').style.display = 'block';
  setupGrid();
}

function goHome() {
  document.getElementById('homeScreen').style.display = 'block';
  document.getElementById('gameScreen').style.display = 'none';
  document.getElementById('winner').style.display = 'none';
  document.getElementById('chicken').style.display = 'none';
}

function setupGrid() {
  const grid = document.getElementById('grid');
  grid.innerHTML = '';
  matchesFound = 0;
  document.getElementById('feedback').innerText = '';
  const pairList = [...items, ...items];
  gridData = shuffle(pairList);

  gridData.forEach((item, index) => {
    const card = document.createElement('div');
    card.classList.add('card');
    card.dataset.value = item;

    const inner = document.createElement('div');
    inner.classList.add('card-inner');

    const front = document.createElement('div');
    front.classList.add('card-front');
    front.innerHTML = '❔'; // back design

    const back = document.createElement('div');
    back.classList.add('card-back');
    back.innerText = item;

    inner.appendChild(front);
    inner.appendChild(back);
    card.appendChild(inner);

    card.addEventListener('click', () => flipCard(card));
    grid.appendChild(card);
  });
}

function flipCard(card) {
  if (lockBoard || card.classList.contains('flipped')) return;
  card.classList.add('flipped');

  if (!firstCard) {
    firstCard = card;
    return;
  }

  const secondCard = card;
  checkMatch(firstCard, secondCard);
  firstCard = null;
}

function checkMatch(card1, card2) {
  if (card1.dataset.value === card2.dataset.value) {
    feedbackMsg(['MATCH!', 'Good job!']);
    playSound('ding');
    matchesFound++;
    if (matchesFound === items.length) {
      endGame();
    }
  } else {
    feedbackMsg(['Not quite right', 'Oops, try again!']);
    playSound('buzzer');
    lockBoard = true;
    card1.classList.add('shake');
    card2.classList.add('shake');
    setTimeout(() => {
      card1.classList.remove('flipped', 'shake');
      card2.classList.remove('flipped', 'shake');
      lockBoard = false;
    }, 800);
  }
}

function feedbackMsg(messages) {
  document.getElementById('feedback').innerText =
    messages[Math.floor(Math.random() * messages.length)];
}

function playSound(id) {
  const sound = document.getElementById(id);
  sound.currentTime = 0;
  sound.play().catch(() => {});
}

function endGame() {
  document.getElementById('winner').style.display = 'block';
  document.getElementById('chicken').style.display = 'block';
}
</script>
</body>
</html>
